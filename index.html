<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>미션 알림장</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <span class="eyebrow">🔔 게임처럼 즐기는 알림장</span>
          <h1>오늘의 미션을 끝내고 내 캐릭터를 키워요</h1>
          <p>숙제, 준비물, 공지 확인을 작은 퀘스트로 바꾸고 보상 코인으로 캐릭터를 성장시키거나 꾸밀 수 있어요.</p>
          <div class="stats-row" aria-label="캐릭터 현황">
            <div><strong id="levelStat">3</strong><span>레벨</span></div>
            <div><strong id="coinStat">95</strong><span>코인</span></div>
            <div><strong id="progressStat">25%</strong><span>완료율</span></div>
          </div>
        </div>
        <div class="character-card" aria-label="캐릭터 미리보기">
          <div class="sparkle sparkle-one">✨</div>
          <div class="sparkle sparkle-two">⭐</div>
          <div class="avatar" id="avatar">
            <span class="face">🐣</span>
          </div>
          <h2>알리</h2>
          <p>성실한 알림장 병아리</p>
          <div class="xp-bar" aria-label="오늘 미션 경험치"><span id="xpFill"></span></div>
        </div>
      </section>

      <section class="content-grid">
        <div class="panel">
          <div class="section-title">
            <div>
              <span class="eyebrow">🏆 오늘의 미션</span>
              <h2>완료하면 코인을 받아요</h2>
            </div>
            <span class="pill" id="donePill">1/4 완료</span>
          </div>
          <div class="mission-list" id="missionList"></div>
        </div>

        <div class="panel shop-panel">
          <div class="section-title">
            <div>
              <span class="eyebrow">✨ 캐릭터 꾸미기</span>
              <h2>보상으로 아이템 구매</h2>
            </div>
          </div>
          <div class="shop-list" id="shopList"></div>
          <div class="growth-card">
            <span aria-hidden="true">⭐</span>
            <div>
              <strong>연속 완료 보너스</strong>
              <p>하루 미션을 모두 완료하면 레벨이 오르고 특별 장식이 열려요.</p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="./src/app.js"></script>
  </body>
</html>
